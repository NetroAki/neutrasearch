name: ci
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libext2fs-dev
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo build --workspace --bins --release --locked
      - run: cargo run --release --locked --bin neutrasearch -- --version
      - run: cargo run --release --locked --bin neutrasearch-helper -- --version
      - if: runner.os == 'Linux'
        run: bash scripts/check-no-walk.sh
      - if: runner.os == 'Linux'
        run: |
          python3 scripts/package_release.py self-test
          VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')
          python3 scripts/package_release.py package --project-root . --target-dir target/release --output-dir dist --target x86_64-unknown-linux-gnu --version "$VERSION" --format tar.gz
          tar -tzf dist/*.tar.gz >/dev/null
