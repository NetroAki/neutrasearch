name: ci
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4

  security-audit:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libext2fs-dev
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo build --workspace --bins --release --locked
      - run: cargo run --release --locked --bin neutrasearch -- --version
      - run: cargo run --release --locked --bin neutrasearch -- index --help
      - run: cargo run --release --locked --bin neutrasearch -- search --help
      - run: cargo run --release --locked --bin neutrasearch-helper -- --version
      - run: cargo run --release --locked --bin neutrasearch-helper -- --build
      - name: Reject directory-walking APIs in native lanes
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if grep -RInE 'std::fs::read_dir|WalkDir|walkdir::|globwalk|jwalk' \
            crates/neutra-btrfs crates/neutra-ntfs crates/neutra-ext4 \
            crates/neutra-zfs crates/neutra-macos \
            crates/neutra-helper/src/watch_linux.rs --include='*.rs'; then
            echo "filesystem-walking API found in a native lane" >&2
            exit 1
          fi
