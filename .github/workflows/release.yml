name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
      - name: Restore ignored release tooling
        shell: bash
        run: |
          git fetch --depth=1 origin refs/tags/v0.1.3
          git archive FETCH_HEAD scripts packaging packages/pi-neutrasearch | tar -xf -
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - id: version
        run: >-
          python scripts/package_release.py check-tag
          --tag "${GITHUB_REF_NAME}"
          --cargo-toml Cargo.toml
          --github-output "${GITHUB_OUTPUT}"
      - run: python scripts/package_release.py self-test

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            format: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            format: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            format: zip
          - os: macos-15-intel
            target: x86_64-apple-darwin
            format: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            format: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Restore ignored release tooling
        shell: bash
        run: |
          git fetch --depth=1 origin refs/tags/v0.1.3
          git archive FETCH_HEAD scripts packaging packages/pi-neutrasearch | tar -xf -
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libext2fs-dev
      - name: Verify native runner
        run: python scripts/package_release.py verify-host --target "${{ matrix.target }}"
      - name: Build release binaries
        run: cargo build --workspace --bins --release --locked --target "${{ matrix.target }}"
      - name: Smoke main binary
        run: cargo run --release --locked --target "${{ matrix.target }}" --bin neutrasearch -- --version
      - name: Smoke helper binary
        run: cargo run --release --locked --target "${{ matrix.target }}" --bin neutrasearch-helper -- --version
      - name: Package portable archive
        run: >-
          python scripts/package_release.py package
          --project-root .
          --target-dir "target/${{ matrix.target }}/release"
          --output-dir dist
          --target "${{ matrix.target }}"
          --version "${{ needs.prepare.outputs.version }}"
          --format "${{ matrix.format }}"
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $compiler)) {
            choco install innosetup --yes --no-progress
          }
          if (-not (Test-Path $compiler)) {
            throw "Inno Setup compiler was not found at $compiler"
          }
          $binDir = (Resolve-Path "target/${{ matrix.target }}/release").Path
          $outputDir = (Resolve-Path "dist").Path
          & $compiler "/DAppVersion=${{ needs.prepare.outputs.version }}" "/DBinDir=$binDir" "/DOutputDir=$outputDir" "packaging/windows/neutrasearch.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE"
          }
      - name: Build Linux installer
        if: runner.os == 'Linux'
        run: >-
          python scripts/package_installers.py linux-deb
          --project-root .
          --target-dir "target/${{ matrix.target }}/release"
          --output-dir dist
          --target "${{ matrix.target }}"
          --version "${{ needs.prepare.outputs.version }}"
      - name: Build macOS installer
        if: runner.os == 'macOS'
        run: >-
          python scripts/package_installers.py macos-dmg
          --project-root .
          --target-dir "target/${{ matrix.target }}/release"
          --output-dir dist
          --target "${{ matrix.target }}"
          --version "${{ needs.prepare.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
      - name: Restore ignored release tooling
        shell: bash
        run: |
          git fetch --depth=1 origin refs/tags/v0.1.3
          git archive FETCH_HEAD scripts packaging packages/pi-neutrasearch | tar -xf -
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - run: python scripts/package_release.py checksums --input-dir dist --output dist/SHA256SUMS
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/*"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          args=(--verify-tag --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then args+=(--prerelease); fi
          gh release create "$GITHUB_REF_NAME" "${args[@]}" dist/*
